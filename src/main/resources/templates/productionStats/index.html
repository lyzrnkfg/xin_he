<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link th:replace="layout::base_header('工序信息')"/>
    <meta charset="utf-8"/>
    <style>
        .table-wrapper {
            max-height: calc(100vh - 350px); /* 控制表格的最大高度 */
            overflow-y: auto; /* 让内容滚动 */
        }
        thead tr {
            position: sticky;
            top: 0;
            background-color: #fff; /* 背景颜色防止内容滚动时透明 */
            z-index: 10; /* 确保表头在上层 */
        }
    </style>
</head>

<body th:replace="layout::header"></body>
<div class="container">
    <!--/*@thymesVar id="message" type="java.lang.String"*/-->
    <div class="alert alert-danger mt-2" role="alert" th:if="${message}" th:text="${message}">
    </div>
    <div class="alert alert-success mt-2" role="alert" th:if="${messageSuccess}" th:text="${messageSuccess}">
    </div>
    <div class="row">
        <form th:action="@{/productionStats/search}" th:method="post" th:object="${productionStatsForm}" role="form" id="productionStatsForm">

            <div class="form-row">
                <div class="form-group col-md-4 row mt-3">
                    <label for="depId" class="col-sm-4 col-form-label">部门</label>
                    <select id="depId" class="form-control col-sm-8" name="depId">
                        <option value="">--请选择部门--</option>
                        <!-- 动态生成选项 -->
                        <option th:each="option : *{depList}"
                                th:value="${option.depId}"
                                th:text="${#strings.defaultString(option.depName, '')}"
                                th:selected="${option.depId == productionStatsForm.depId}">
                            Option Name
                        </option>
                    </select>
                </div>
                <div class="form-group col-md-4 row mt-3 ml-3">
                    <label for="productId" class="col-sm-4 col-form-label">商品</label>
                    <select id="productId" class="form-control col-sm-8" name="productId">
                        <option value="">--请选择商品--</option>
                        <!-- 动态生成选项 -->
                        <option th:each="option : *{productList}"
                                th:value="${option.productId}"
                                th:text="${#strings.defaultString(option.productStyleName, '')} + ' - ' + ${#strings.defaultString(option.productName, '')}"
                                th:selected="${option.productId == productionStatsForm.productId}">
                            Option Name
                        </option>
                    </select>
                </div>
                <div class="form-group col-md-4 row mt-3 ml-3">
                    <label for="useDate" class="col-sm-4 col-form-label">日期</label>
                    <input class="form-control col-sm-8" type="text" id="useDate" aria-label="选择开始日" th:field="*{useDate}" placeholder="请选择工作日">
                </div>
            </div>

<!--            </div>-->

            <div class="form-group row mx-auto">
                <button class="btn btn-light btn-sm btn-radius" type="submit">検索</button>
                <button class="reset btn btn-info btn-sm btn-radius ml-3" type="button">
                    <span>検索条件クリア</span>
                </button>
            </div>
        </form>


        <div th:if="${pageInfo != null}" >
            <h3><strong>人均信息</strong></h3>
            <div class="row table-wrapper">
                <table class="table table-striped table-bordered table-hover table-condensed col-md-12">
                    <thead>
                    <tr class="bg-success text-white">
                        <th>部门</th>
                        <th>工作人数</th>
                        <th>工作时间</th>
                        <th>工作日</th>
                        <th>商品</th>
                        <th>人均产量</th>
                        <th>计划日产量</th>
                        <th>订单交付天数</th>
                        <th>人均单价</th>
                        <th>人均时间</th>
                        <th>编辑</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="productionStats : ${pageInfo.list}">
                        <td th:text="${productionStats.depName}"></td>
                        <td th:text="${productionStats.peopleNumber}"></td>
                        <td th:text="${productionStats.workTime}"></td>
                        <td th:text="${productionStats.useDate}"></td>
                        <td th:text="${#strings.defaultString(productionStats.productStyleName, '')} + ' - ' + ${#strings.defaultString(productionStats.productName, '')}"></td>
                        <td th:text="${productionStats.avgOutputPerPerson}"></td>
                        <td th:text="${productionStats.plannedDailyOutput}"></td>
                        <td th:text="${productionStats.orderDeliveryDays}"></td>
                        <td th:text="${productionStats.pricePerUnit}"></td>
                        <td th:text="${productionStats.timePerPerson}"></td>
                        <td>
                            <a th:href="@{/productionStats/delete/{id}(id=${productionStats.productionStatsId})}"
                               class="btn btn-xs btn-danger btn-radius"
                               onclick="return confirm('确定要删除吗？')">删除</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="row mt-1">
                <a th:href="@{/productionStats/add}" class="btn btn-primary mb-3 btn-sm btn-radius">添加</a>
            </div>
            <div class="row">
                <!--/*@thymesVar id="pageInfo" type="com.github.pagehelper.PageInfo"*/-->
                <ul th:replace="page/pageKmirari::paging(${pageInfo})"></ul>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">

    $(".reset").click(function(){
        $(":input", "#productionStatsForm").not(":button", ":reset", ":hidden", ":submit").not("select[disabled='disabled']").val("").removeAttr("checked").removeAttr("selected");
        $(".custom-file-label").html("100KB");
    })

    $(document).on('change', '.custom-file-input', function (event) {
        $(this).next('.custom-file-label').html(event.target.files[0].name);
    })

    $(function() {
        $.samaskHtml();

        $('#productionStatsForm').materializeInputs(".input-material #name-field");

        $('#useDate').datetimepicker({
            language: 'zh-CN', // 中文语言包
            autoclose: true, // 选中日期后自动关闭
            format: 'yyyy-mm-dd', // 日期格式
            minView: "month", // 最小日期显示单元
            todayBtn: true, // 显示今天按钮
            todayHighlight: true, // 显示今天高亮
            defaultDate: new Date(), // 默认显示当天日期
            useCurrent: true
        });
    });

</script>
</html>
