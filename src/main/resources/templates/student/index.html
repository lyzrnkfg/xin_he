<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link th:replace="layout::base_header('员工信息')"/>
    <meta charset="utf-8"/>

<body th:replace="layout::header"></body>
<div class="container">
    <!--/*@thymesVar id="message" type="java.lang.String"*/-->
    <div class="alert alert-danger mt-2" role="alert" th:if="${message}" th:text="${message}">

    <div class="alert alert-success mt-2" role="alert" th:if="${messageSuccess}" th:text="${messageSuccess}">

    <div class="row">
        <div class="col-md-4">
            <form th:action="@{/student/search}" th:method="post" th:object="${studentForm}" role="form" id="studentForm">
                <div class="form-group input-material">
                    <input type="text" class="form-control col-md-8 required" id="name-field" th:field="*{userName}">
                    <label for="name-field">姓名</label>
                </div>

                <div class="form-group row">
                    <label for="depId" class="col-sm-4 col-form-label">部门</label>
                    <select id="depId" class="form-control ml-3 col-sm-10" name="depId">
                        <option value="">--请选择部门--</option>
                        <!-- 动态生成选项 -->
                        <option th:each="option : *{depList}"
                                th:value="${option.depId}"
                                th:text="${option.depName}"
                                th:selected="${option.depId == studentForm.depId}">
                            Option Name
                        </option>
                    </select>
                </div>

                <!--            </div>-->

                <div class="form-group row mx-auto">
                    <button class="btn btn-light btn-sm btn-radius" type="submit">検索</button>
                    <button class="reset btn btn-info btn-sm btn-radius ml-3" type="button">
                        <span>検索条件クリア</span>
                    </button>
                </div>
            </form>


        </div>
        <div class="col-md-8">
            <form th:action="@{/student/update}" th:method="post" role="form">

                <div th:if="${pageInfo != null}" >

                    <div class="row">
                        <table class="table table-striped table-bordered table-hover table-condensed col-md-6">
                            <legend>
                                <strong>员工信息</strong>
                            </legend>
                            <thead>
                            <tr class="bg-success text-white">
                                <th>ID</th>
                                <th>姓名</th>
                                <th>部门</th>
                                <th>编辑</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!--/*@thymesVar id="student" type="com.nasus.helloword.form.Student"*/-->
                            <tr th:each="student : ${pageInfo.list}">
                                <input type="hidden" th:value="${student.userId}">
                                <td th:text="${student.userId}"></td>
                                <td th:text="${student.userName}"></td>
                                <td th:text="${student.depName}"></td>
                                <td>
                                    <a th:href="@{/student/edit/{id}(id=${student.userId})}" class="btn btn-xs btn-info btn-radius">编辑</a>
                                    <a th:href="@{/student/delete/{id}(id=${student.userId})}"
                                       class="btn btn-xs btn-danger btn-radius"
                                       onclick="return confirm('确定要删除吗？')">删除</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="row">
                        <a th:href="@{/student/add}" class="btn btn-primary mb-3 btn-sm btn-radius">添加员工</a>
                    </div>

                        <ul th:replace="page/pageKmirari::paging(${pageInfo})"></ul>
                    </div>

</div>

<script th:inline="javascript">

    $(".reset").click(function(){
        $(":input", "#studentForm,#oneUploadForm,#allUploadForm").not(":button", ":reset", ":hidden", ":submit").not("select[disabled='disabled']").val("").removeAttr("checked").removeAttr("selected");
        $(".custom-file-label").html("100KB");
    })

    $('#age').placeholderTypewriter({
        text: ["Only three digits can be entered !", "999", "99", "9"]
    });

    $(document).on('change', '.custom-file-input', function (event) {
        $(this).next('.custom-file-label').html(event.target.files[0].name);
    })

    $(function() {
        $.samaskHtml();

        $('#studentForm').materializeInputs(".input-material #name-field");
    });

</script>
</html>
